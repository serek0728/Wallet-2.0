<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallet 2.0</title>

    <link href="https://fonts.googleapis.com/css?family=Montserrat:200,400,500,700&display=swap&subset=latin-ext"
        rel="stylesheet" />

    <link rel="stylesheet" href="./css/style.css" />
    <script src="https://kit.fontawesome.com/8512d6024b.js" crossorigin="anonymous"></script>
</head>

<body>

    <header class="app-header">
        <div class="app-header__branding">
            <h1 class="app-title">
                <i class="fas fa-wallet"></i>
                Wallet 2.0
            </h1>
            <p class="app-subtitle">Zarządzaj swoimi finansami w jednym miejscu</p>
        </div>

        <button class="theme-toggle" aria-label="Zmień motyw">
            <i class="fas fa-moon"></i>
        </button>
    </header>

    <main class="app-main">

        <section class="summary-section">
            <div class="summary-card summary-card--balance">
                <p class="summary-card__label">Saldo</p>
                <p class="summary-card__value" id="balanceAmount">0 zł</p>
            </div>

            <div class="summary-card summary-card--income">
                <p class="summary-card__label">Przychody</p>
                <p class="summary-card__value" id="incomeAmount">0 zł</p>
            </div>

            <div class="summary-card summary-card--expense">
                <p class="summary-card__label">Wydatki</p>
                <p class="summary-card__value" id="expenseAmount">0 zł</p>
            </div>
        </section>

        <section class="actions-section">
            <button class="btn btn--primary" id="openAddTransactionModal">
                <i class="fas fa-plus"></i>
                Dodaj transakcję
            </button>

            <button class="btn btn--danger" id="deleteAllTransactions">
                <i class="fas fa-trash-alt"></i>
                Wyczyść wszystko
            </button>
        </section>

        <section class="transactions-section">
            <div class="section-header">
                <h2 class="section-title">Historia transakcji</h2>
                <p class="section-subtitle" id="transactionsCount">0 transakcji</p>
            </div>

            <div class="empty-state" id="emptyState">
                <i class="fas fa-receipt"></i>
                <h3>Nie masz jeszcze żadnych transakcji</h3>
                <p>Dodaj pierwszy przychód lub wydatek, aby rozpocząć.</p>
            </div>

            <div class="transactions-list" id="transactionsList">
                <!-- Transakcje renderowane dynamicznie przez JS -->
            </div>
        </section>

    </main>

    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal">
            <div class="modal__header">
                <div>
                    <h2 class="modal__title">Dodaj nową transakcję</h2>
                    <p class="modal__subtitle">Uzupełnij dane transakcji</p>
                </div>

                <button class="modal__close" id="closeModal" aria-label="Zamknij okno">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <form class="transaction-form" id="transactionForm">

                <div class="form-group">
                    <label for="transactionType">Typ transakcji</label>
                    <select id="transactionType" name="transactionType">
                        <option value="">Wybierz typ</option>
                        <option value="income">Przychód</option>
                        <option value="expense">Wydatek</option>
                    </select>
                    <small class="form-error" id="transactionTypeError"></small>
                </div>

                <div class="form-group">
                    <label for="transactionTitle">Nazwa transakcji</label>
                    <input type="text" id="transactionTitle" name="transactionTitle"
                        placeholder="Np. Wypłata, Zakupy Lidl" />
                    <small class="form-error" id="transactionTitleError"></small>
                </div>

                <div class="form-group">
                    <label for="transactionAmount">Kwota</label>
                    <input type="number" id="transactionAmount" name="transactionAmount" placeholder="Np. 250" min="0"
                        step="0.01" />
                    <small class="form-error" id="transactionAmountError"></small>
                </div>

                <div class="form-group">
                    <label for="transactionCategory">Kategoria</label>
                    <select id="transactionCategory" name="transactionCategory">
                        <option value="">Wybierz kategorię</option>
                    </select>
                    <small class="form-error" id="transactionCategoryError"></small>
                </div>

                <div class="form-group">
                    <label for="transactionDate">Data</label>
                    <input type="date" id="transactionDate" name="transactionDate" />
                    <small class="form-error" id="transactionDateError"></small>
                </div>

                <div class="form-group">
                    <label for="transactionNote">Notatka (opcjonalnie)</label>
                    <textarea id="transactionNote" name="transactionNote" rows="4"
                        placeholder="Dodaj krótki opis transakcji..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn--secondary" id="cancelTransaction">
                        Anuluj
                    </button>

                    <!-- <button type="submit" class="btn btn--primary">
                        <i class="fas fa-save"></i>
                        Zapisz transakcję
                    </button> -->
                </div>
            </form>
        </div>
    </div>

<script type="module" src="./js/main.js"></script>
</body>

</html>
